<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Mobile crane working on an industrial site</title>
  <desc id="desc">A clean realistic illustration of a mobile crane truck lifting a heavy load on a work site.</desc>
  <defs>
